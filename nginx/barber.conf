# /etc/nginx/sites-available/barber
# Домен: barber-house.academy

server {
    listen 80;
    server_name barber-house.academy www.barber-house.academy;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name barber-house.academy www.barber-house.academy;

    ssl_certificate     /etc/letsencrypt/live/barber-house.academy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barber-house.academy/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Max body size for image uploads (10 MB)
    client_max_body_size 10m;

    root /var/www/barber/dist;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    # Uploaded images — ^~ prevents regex static block from intercepting
    location ^~ /uploads/ {
        alias /var/www/barber/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Admin panel — ^~ same reason
    location ^~ /admin/ {
        alias /var/www/barber/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Static assets caching (won't match /uploads/ or /admin/ thanks to ^~)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — LAST
    location / {
        try_files $uri $uri/ /index.html;
    }
}
